syntax = "proto3";

package tests;

message Person {
  string name = 1;
  int32 id = 2;
  optional string email = 3;

  enum PhoneType {
    PHONE_TYPE_UNSPECIFIED = 0;
    PHONE_TYPE_MOBILE = 1;
    PHONE_TYPE_HOME = 2;
    PHONE_TYPE_WORK = 3;
  }

  message PhoneNumber {
    string number = 1;
    PhoneType type = 2;
  }

  repeated PhoneNumber phones = 4;

  map<string, string> tags = 5;
  oneof something {
    string oneof_string = 6;
    int64 oneof_int = 7;
    PhoneNumber oneof_phone = 8;
  }
}

message AddressBook {
  repeated Person people = 1;
}
